<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon & Recipe App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    textarea { width: 100%; height: 100px; }
    button { padding: 0.5rem 1rem; margin: 0.5rem 0; }
    pre { background: #f4f4f4; padding: 1rem; overflow:auto; }
  </style>
</head>
<body>
  <h1>Carbon & Recipe Calculator</h1>
  <label>Masukkan bahan (contoh: “100 gram chicken, 50 gram rice”):</label>
  <textarea id="inputText"></textarea>
  <button id="btnCarbon">Hitung Karbon</button>
  <button id="btnRecipe">Rekomendasi Resep</button>

  <h2>Hasil Parsing & Total Karbon</h2>
  <pre id="carbonResult">—</pre>

  <h2>Rekomendasi Resep</h2>
  <pre id="recipeResult">—</pre>

  <script>
    const baseURL = "https://capstone-ml-production.up.railway.app/";
    document.getElementById("btnCarbon").onclick = async () => {
      const text = document.getElementById("inputText").value;
      const res = await fetch(baseURL + "/carbon", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const j = await res.json();
      document.getElementById("carbonResult").textContent = 
        JSON.stringify(j, null, 2);
    };
    document.getElementById("btnRecipe").onclick = async () => {
      const text = document.getElementById("inputText").value;
      const res = await fetch(baseURL + "/recipes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const j = await res.json();
      document.getElementById("recipeResult").textContent = 
        JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
